command_timeout = 5000
add_newline = true

[username]
show_always = true
style_user = "bg:#303446"
style_root = "bg:#303446"
format = '[$user ]($style)'

[directory]
style = "bg:#414559"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇŽ/"
